services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rsvp-app
    restart: unless-stopped
    env_file: .env
    networks:
      - rsvp
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: rsvp-nginx
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - rsvp
    depends_on:
      - app

  db:
    image: postgres:17-alpine
    container_name: rsvp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-rsvp}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - rsvp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  rsvp:
    driver: bridge

volumes:
  pgdata:
